{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">
        <div class="col">
            <h2 class="fw-bold">Audit Logs</h2>
            <p class="text-muted">
                View all system activities and user actions.
            </p>
        </div>
    </div>

    <div class="card shadow border-0">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <i class="fas fa-history"></i> Audit Log Records
            </h5>
        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover table-striped align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>User ID</th>
                            <th>Action</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for log in logs %}
                        <tr>
                            <td>{{ log.user_id }}</td>
                            <td>{{ log.action }}</td>
                            <td>{{ log.timestamp }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>

                </table>

            </div>

        </div>
    </div>

</div>

{% endblock %}
