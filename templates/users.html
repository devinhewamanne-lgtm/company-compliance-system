{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">
        <div class="col">
            <h2 class="fw-bold text-primary">
                User Management
            </h2>
            <p class="text-muted">
                Create and manage system users.
            </p>
        </div>
    </div>

    <div class="card shadow-lg border-0">

        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                Add New User
            </h5>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row g-3">

                    <div class="col-md-4">
                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Username"
                            required>
                    </div>

                    <div class="col-md-4">
                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Password"
                            required>
                    </div>

                    <div class="col-md-2">
                        <select
                            name="role"
                            class="form-select">

                            <option value="admin">Admin</option>
                            <option value="staff">Staff</option>

                        </select>
                    </div>

                    <div class="col-md-2">
                        <button
                            type="submit"
                            class="btn btn-primary w-100">
                            Add User
                        </button>
                    </div>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
