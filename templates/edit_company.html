<div class="edit-company-container">

    <div class="page-header">
        <h1>🏢 Edit Company</h1>
        <p>Update company information and save changes.</p>
    </div>

    <div class="edit-card">

        <form method="POST">

            <div class="form-group">
                <label>Company Name</label>
                <input type="text"
                       name="company_name"
                       value="{{ company.company_name }}"
                       class="form-control">
            </div>

            <div class="form-group">
                <label>Registration Number</label>
                <input type="text"
                       name="registration_number"
                       value="{{ company.registration_number }}"
                       class="form-control">
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea
                    name="address"
                    class="form-control">{{ company.address }}</textarea>
            </div>

            <div class="form-group">
                <label>Contact Person</label>
                <input type="text"
                       name="contact_person"
                       value="{{ company.contact_person }}"
                       class="form-control">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text"
                       name="phone"
                       value="{{ company.phone }}"
                       class="form-control">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email"
                       name="email"
                       value="{{ company.email }}"
                       class="form-control">
            </div>

            <button type="submit" class="update-btn">
                💾 Update Company
            </button>

        </form>

    </div>

</div>
